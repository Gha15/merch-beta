<svg width="300" height="150" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Audiowide&display=swap');
      .coming-soon-text {
        font-family: 'Audiowide', sans-serif;
        font-weight: 400;
        fill: #ffeb3b;
        text-anchor: middle;
        letter-spacing: 4px;
      }
    </style>
    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="300" height="150" fill="#0d0d0d"/>
  <rect x="5" y="5" width="290" height="140" fill="none" stroke="transparent"/>
  
  <circle cx="150" cy="75" r="110" fill="none" stroke="#ffeb3b" stroke-width="0.5" opacity="0.03"/>
  <circle cx="150" cy="75" r="90" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.06"/>
  <circle cx="150" cy="75" r="70" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.1"/>
  <circle cx="150" cy="75" r="50" fill="none" stroke="#ffeb3b" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
  
  <text x="152" y="90" class="coming-soon-text" font-size="56" opacity="0.35" letter-spacing="4">COMING SOON</text>
  <text x="150" y="87" class="coming-soon-text" font-size="56" filter="url(#glow)">COMING SOON</text>
  
  <line x1="20" y1="25" x2="280" y2="25" stroke="#ffeb3b" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <line x1="20" y1="125" x2="280" y2="125" stroke="#ffeb3b" stroke-width="4" opacity="0.85" filter="url(#glow)"/>
  
  <line x1="8" y1="8" x2="30" y2="8" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  <line x1="8" y1="8" x2="8" y2="30" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  
  <line x1="292" y1="8" x2="270" y2="8" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  <line x1="292" y1="8" x2="292" y2="30" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  
  <line x1="8" y1="142" x2="30" y2="142" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  <line x1="8" y1="142" x2="8" y2="120" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  
  <line x1="292" y1="142" x2="270" y2="142" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  <line x1="292" y1="142" x2="292" y2="120" stroke="#ffeb3b" stroke-width="3" opacity="0.7"/>
  
  <circle cx="150" cy="75" r="3" fill="#ffeb3b" opacity="0.6" filter="url(#glow)"/>
</svg>
