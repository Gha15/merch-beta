        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="300" height="150" fill="#0d0d0d"/>
  <rect x="5" y="5" width="290" height="140" fill="none" stroke="transparent"/>
  
