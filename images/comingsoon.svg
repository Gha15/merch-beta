<svg width="300" height="150" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
      .coming-soon-text {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        fill: #ffeb3b;
        text-anchor: middle;
        letter-spacing: 3px;
      }
    </style>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="300" height="150" fill="#0d0d0d"/>
  
  <!-- Transparent padding area for safety -->
  <rect x="10" y="10" width="280" height="130" fill="none" stroke="transparent" stroke-width="1"/>
  
  <!-- Glow circles -->
  <circle cx="150" cy="75" r="90" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.08" filter="url(#glow)"/>
  <circle cx="150" cy="75" r="70" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.12" filter="url(#glow)"/>
  <circle cx="150" cy="75" r="50" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Shadow/depth effect -->
  <text x="151" y="84" class="coming-soon-text" font-size="38" opacity="0.3">COMING SOON</text>
  
  <!-- Main glowing text -->
  <text x="150" y="82" class="coming-soon-text" font-size="38" filter="url(#glow)">COMING SOON</text>
  
  <!-- Bottom accent line with glow -->
  <line x1="60" y1="110" x2="240" y2="110" stroke="#ffeb3b" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Corner accent dots -->
  <circle cx="20" cy="20" r="2" fill="#ffeb3b" opacity="0.6"/>
  <circle cx="280" cy="20" r="2" fill="#ffeb3b" opacity="0.6"/>
  <circle cx="20" cy="130" r="2" fill="#ffeb3b" opacity="0.6"/>
  <circle cx="280" cy="130" r="2" fill="#ffeb3b" opacity="0.6"/>
</svg>
