<svg width="300" height="150" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Audiowide&display=swap');
      .coming-soon-text {
        font-family: 'Audiowide', sans-serif;
        font-weight: 400;
        fill: #ffeb3b;
        text-anchor: middle;
        letter-spacing: 3px;
      }
    </style>
    <!-- Strong glow filter -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="300" height="150" fill="#0d0d0d"/>
  
  <!-- Extra safe area padding (transparent) -->
  <rect x="2" y="2" width="296" height="146" fill="none" stroke="transparent"/>
  
  <!-- Large glow circles -->
  <circle cx="150" cy="75" r="100" fill="none" stroke="#ffeb3b" stroke-width="0.5" opacity="0.04"/>
  <circle cx="150" cy="75" r="80" fill="none" stroke="#ffeb3b" stroke-width="1" opacity="0.08"/>
  <circle cx="150" cy="75" r="60" fill="none" stroke="#ffeb3b" stroke-width="1.5" opacity="0.12"/>
  <circle cx="150" cy="75" r="40" fill="none" stroke="#ffeb3b" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Neon shadow for depth -->
  <text x="151" y="88" class="coming-soon-text" font-size="50" opacity="0.3" letter-spacing="3">COMING SOON</text>
  
  <!-- Main neon glowing text -->
  <text x="150" y="86" class="coming-soon-text" font-size="50" filter="url(#glow)" opacity="0.95">COMING SOON</text>
  
  <!-- Top neon accent line -->
  <line x1="30" y1="30" x2="270" y2="30" stroke="#ffeb3b" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  
  <!-- Bottom neon accent line -->
  <line x1="30" y1="120" x2="270" y2="120" stroke="#ffeb3b" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Corner geometric elements -->
  <line x1="10" y1="10" x2="25" y2="10" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="10" x2="10" y2="25" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  
  <line x1="290" y1="10" x2="275" y2="10" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  <line x1="290" y1="10" x2="290" y2="25" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  
  <line x1="10" y1="140" x2="25" y2="140" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="140" x2="10" y2="125" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  
  <line x1="290" y1="140" x2="275" y2="140" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
  <line x1="290" y1="140" x2="290" y2="125" stroke="#ffeb3b" stroke-width="2" opacity="0.6"/>
</svg>
